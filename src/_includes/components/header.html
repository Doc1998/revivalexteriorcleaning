<style>
  :root {
    --pd-primary: #0F2A43;
    --pd-accent: #F59E0B;
    --pd-light: #E8F4FD;
    --pd-white: #ffffff;
    --pd-font-display: 'Poppins', sans-serif;
    --pd-font-body: 'Roboto', sans-serif;
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .pd-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    width: 100%;
    font-family: var(--pd-font-body);
  }

  /* ── Top Bar ── */
  .pd-topbar {
    background-color: var(--pd-primary);
    color: var(--pd-white);
    font-size: 0.78rem;
    padding: 6px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }

  .pd-topbar__tagline {
    font-family: var(--pd-font-display);
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--pd-accent);
  }

  .pd-topbar__right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .pd-topbar__phone {
    color: var(--pd-white);
    text-decoration: none;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.2s;
  }

  .pd-topbar__phone:hover {
    color: var(--pd-accent);
  }

  .pd-topbar__socials {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .pd-topbar__socials a {
    color: var(--pd-white);
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }

  .pd-topbar__socials a:hover {
    color: var(--pd-accent);
  }

  /* ── Main Nav Bar ── */
  .pd-mainbar {
    background-color: var(--pd-white);
    box-shadow: 0 2px 8px rgba(15, 42, 67, 0.12);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 68px;
    position: relative;
  }

  /* Logo */
  .pd-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .pd-logo img {
    height: 115px;
    width: auto;
    display: block;
  }

  .pd-logo__text {
    font-family: var(--pd-font-display);
    font-weight: 700;
    font-size: 1rem;
    color: var(--pd-primary);
    line-height: 1.2;
    max-width: 140px;
  }

  .pd-logo__text span {
    display: block;
    font-weight: 400;
    font-size: 0.72rem;
    color: var(--pd-accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Nav */
  .pd-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    list-style: none;
  }

  .pd-nav a {
    font-family: var(--pd-font-display);
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--pd-primary);
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }

  .pd-nav a:hover {
    color: var(--pd-accent);
    background: var(--pd-light);
  }

  /* CTA Button */
  .pd-cta-btn {
    font-family: var(--pd-font-display);
    font-size: 0.85rem;
    font-weight: 700;
    background-color: var(--pd-accent);
    color: var(--pd-primary);
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 5px;
    white-space: nowrap;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  .pd-cta-btn:hover {
    background-color: #d97706;
    transform: translateY(-1px);
  }

  /* Hamburger */
  .pd-hamburger {
    display: none;
    background: none;
    border: 2px solid var(--pd-primary);
    border-radius: 4px;
    cursor: pointer;
    padding: 6px;
    flex-direction: column;
    gap: 4px;
    align-items: center;
    justify-content: center;
  }

  .pd-hamburger__line {
    display: block;
    width: 22px;
    height: 2px;
    background-color: var(--pd-primary);
    border-radius: 2px;
    transition: transform 0.25s, opacity 0.25s;
  }

  /* Mobile nav wrapper */
  .pd-nav-wrapper {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* ── Responsive ── */
  @media (max-width: 767px) {
    .pd-topbar__tagline {
      display: none;
    }

    .pd-hamburger {
      display: flex;
    }

    .pd-nav-wrapper {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: var(--pd-white);
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      padding: 0;
      box-shadow: 0 6px 16px rgba(15, 42, 67, 0.15);
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
    }

    .pd-nav-wrapper.is-open {
      max-height: 600px;
      padding: 10px 0 16px;
    }

    .pd-nav {
      flex-direction: column;
      gap: 0;
      width: 100%;
    }

    .pd-nav li {
      width: 100%;
    }

    .pd-nav a {
      display: block;
      padding: 12px 24px;
      border-radius: 0;
      font-size: 0.95rem;
      border-bottom: 1px solid var(--pd-light);
    }

    .pd-cta-btn {
      margin: 12px 24px 0;
      text-align: center;
      display: block;
    }

    /* Hamburger open state */
    .pd-hamburger.is-open .pd-hamburger__line:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }

    .pd-hamburger.is-open .pd-hamburger__line:nth-child(2) {
      opacity: 0;
    }

    .pd-hamburger.is-open .pd-hamburger__line:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }
  }

  @media (min-width: 768px) and (max-width: 1024px) {
    .pd-nav a {
      padding: 6px 7px;
      font-size: 0.78rem;
    }

    .pd-cta-btn {
      padding: 9px 13px;
      font-size: 0.78rem;
    }
  }
</style>

<script>
  (function () {
    var btn = document.getElementById('pd-hamburger-btn');
    var wrapper = document.getElementById('pd-nav-wrapper');
    if (!btn || !wrapper) return;
    btn.addEventListener('click', function () {
      var isOpen = wrapper.classList.toggle('is-open');
      btn.classList.toggle('is-open', isOpen);
      btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
    document.addEventListener('click', function (e) {
      if (!btn.contains(e.target) && !wrapper.contains(e.target)) {
        wrapper.classList.remove('is-open');
        btn.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  })();
</script>
